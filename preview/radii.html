<!-- @dsCard group="Spacing" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 28px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items: end; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 80px; height: 64px; background: var(--fs-sky); border: 1px solid #B6CFE6; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head>
<body class="card">
  
    <div class="item">
      <div class="box" style="border-radius:4px"></div>
      <span class="name">--r-xs</span>
      <span class="v">4px</span>
    </div>
  
    <div class="item">
      <div class="box" style="border-radius:8px"></div>
      <span class="name">--r-sm</span>
      <span class="v">8px</span>
    </div>
  
    <div class="item">
      <div class="box" style="border-radius:12px"></div>
      <span class="name">--r-md</span>
      <span class="v">12px</span>
    </div>
  
    <div class="item">
      <div class="box" style="border-radius:20px"></div>
      <span class="name">--r-lg</span>
      <span class="v">20px</span>
    </div>
  
    <div class="item">
      <div class="box" style="border-radius:28px"></div>
      <span class="name">--r-xl</span>
      <span class="v">28px</span>
    </div>
  
    <div class="item">
      <div class="box" style="border-radius:999px"></div>
      <span class="name">--r-pill</span>
      <span class="v">999</span>
    </div>
  
</body></html>
