<!-- @dsCard group="Type" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 28px 32px; display: flex; flex-direction: column; gap: 22px; justify-content: center; }
  .name { font-family: var(--font-sub); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .eyebrow { font-family: var(--font-sub); font-weight: 500; font-size: 14px; letter-spacing: .18em; text-transform: uppercase; color: var(--fs-blue); }
  .sub { font-family: var(--font-sub); font-weight: 600; font-size: 28px; color: var(--fg-1); letter-spacing: -.005em; }
  .label { font-family: var(--font-sub); font-weight: 500; font-size: 13px; color: var(--fg-2); letter-spacing: .02em; }
</style></head>
<body class="card">
  <div><div class="name">Montserrat Medium · Eyebrow · 14 / .18em</div>
       <div class="eyebrow">NUEVOS ESPACIOS INTELIGENTES</div></div>
  <div><div class="name">Montserrat SemiBold · Subhead · 28</div>
       <div class="sub">Domos, sensores y cerraduras</div></div>
  <div><div class="name">Montserrat Medium · UI label · 13</div>
       <div class="label">Cerradura Inteligente · Sala</div></div>
</body></html>
