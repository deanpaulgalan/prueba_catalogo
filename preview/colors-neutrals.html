<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 0; }
  .row { display: grid; grid-template-columns: repeat(9, 1fr); height: 100%; min-height: 200px; }
  .step { display: flex; flex-direction: column; justify-content: space-between; padding: 14px 12px; color: #fff; }
  .name { font-family: var(--font-sub); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; opacity: .85; }
  .hex { font-family: var(--font-mono); font-size: 10.5px; opacity: .9; }
  .lightcolor { color: var(--fs-ink) !important; }
</style></head>
<body class="card">
  <div class="row">
    <div class="step" style="background:#0B0D2A"><span class="name">Ink</span><span class="hex">0B0D2A</span></div>
    <div class="step" style="background:#1F2235"><span class="name">Graphite</span><span class="hex">1F2235</span></div>
    <div class="step" style="background:#3E4257"><span class="name">Slate</span><span class="hex">3E4257</span></div>
    <div class="step" style="background:#6B6F85"><span class="name">Steel</span><span class="hex">6B6F85</span></div>
    <div class="step" style="background:#9498AC"><span class="name">Mute</span><span class="hex">9498AC</span></div>
    <div class="step lightcolor" style="background:#D9DCE6"><span class="name">Line</span><span class="hex">D9DCE6</span></div>
    <div class="step lightcolor" style="background:#EEF0F6"><span class="name">Cloud</span><span class="hex">EEF0F6</span></div>
    <div class="step lightcolor" style="background:#F8F9FC"><span class="name">Paper</span><span class="hex">F8F9FC</span></div>
    <div class="step lightcolor" style="background:#FFFFFF;border-left:1px solid #D9DCE6"><span class="name">White</span><span class="hex">FFFFFF</span></div>
  </div>
</body></html>
