<!-- @dsCard group="Brand" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 0; }
  .stage { background: var(--fs-blue); height: 100%; min-height: 260px; position: relative; overflow: hidden; }
  .stage svg { position: absolute; right: -10%; top: 50%; transform: translateY(-50%); width: 90%; height: 200%; color: rgba(255,255,255,.45); }
  .copy { position: relative; padding: 30px 36px; color: #fff; max-width: 60%; }
  .eyebrow { font-family: var(--font-sub); font-weight: 500; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; opacity: .8; }
  .h { font-family: var(--font-display); font-weight: 800; font-size: 36px; letter-spacing: -.03em; line-height: 1.05; margin-top: 8px; }
  .p { font-family: var(--font-body); font-size: 12px; opacity: .8; margin-top: 8px; }
</style></head>
<body class="card">
  <div class="stage">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice" fill="none">
      <g stroke="currentColor" stroke-width="1">
        <circle cx="500" cy="500" r="60"/><circle cx="500" cy="500" r="120"/><circle cx="500" cy="500" r="200"/>
        <circle cx="500" cy="500" r="295"/><circle cx="500" cy="500" r="405"/><circle cx="500" cy="500" r="525"/>
        <circle cx="500" cy="500" r="650"/>
      </g>
    </svg>
    <div class="copy">
      <div class="eyebrow">Ripple background</div>
      <div class="h">Elige el cambio.</div>
      <div class="p">The brand-defining backdrop — concentric circles emanating from a touch point. Use it large, faint, and once per page.</div>
    </div>
  </div>
</body></html>
