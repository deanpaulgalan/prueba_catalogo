<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 0; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); height: 100%; min-height: 200px; }
  .step { display: flex; flex-direction: column; justify-content: space-between; padding: 14px 12px; color: #fff; }
  .name { font-family: var(--font-sub); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; opacity: .85; }
  .hex { font-family: var(--font-mono); font-size: 10.5px; opacity: .9; }
  .lightcolor { color: var(--fs-blue) !important; }
</style></head>
<body class="card">
  <div class="row">
    <div class="step lightcolor" style="background:#F3F4FD"><span class="name">50</span><span class="hex">F3F4FD</span></div>
    <div class="step lightcolor" style="background:#E5E7F9"><span class="name">100</span><span class="hex">E5E7F9</span></div>
    <div class="step lightcolor" style="background:#C5C8F1"><span class="name">200</span><span class="hex">C5C8F1</span></div>
    <div class="step lightcolor" style="background:#9DA1E5"><span class="name">300</span><span class="hex">9DA1E5</span></div>
    <div class="step" style="background:#7176D6"><span class="name">400</span><span class="hex">7176D6</span></div>
    <div class="step" style="background:#5256C4"><span class="name">500</span><span class="hex">5256C4</span></div>
    <div class="step" style="background:#3F43B0"><span class="name">600 · brand</span><span class="hex">3F43B0</span></div>
    <div class="step" style="background:#3338A0"><span class="name">700</span><span class="hex">3338A0</span></div>
    <div class="step" style="background:#2A2E8E"><span class="name">800</span><span class="hex">2A2E8E</span></div>
    <div class="step" style="background:#1E2270"><span class="name">900</span><span class="hex">1E2270</span></div>
  </div>
</body></html>
