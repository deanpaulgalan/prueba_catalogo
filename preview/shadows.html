<!-- @dsCard group="Spacing" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 32px; background: var(--fs-paper); display: grid; grid-template-columns: repeat(5, 1fr); gap: 22px; align-items: center; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box { width: 90px; height: 56px; border-radius: 16px; background: #fff; border: 1px solid rgba(11,13,42,.04); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .v { font-family: var(--font-body); font-size: 10px; color: var(--fg-3); text-align:center; }
</style></head>
<body class="card">
  <div class="item"><div class="box" style="box-shadow: 0 1px 2px rgba(11,13,42,0.06), 0 1px 1px rgba(11,13,42,0.04)"></div><span class="name">--shadow-1</span><span class="v">hairline</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 4px 12px rgba(11,13,42,0.07), 0 1px 2px rgba(11,13,42,0.04)"></div><span class="name">--shadow-2</span><span class="v">card</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 12px 28px rgba(11,13,42,0.10), 0 2px 4px rgba(11,13,42,0.05)"></div><span class="name">--shadow-3</span><span class="v">popover</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 28px 60px rgba(11,13,42,0.16), 0 4px 8px rgba(11,13,42,0.06)"></div><span class="name">--shadow-4</span><span class="v">modal</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 12px 32px rgba(63,67,176,0.28)"></div><span class="name">--shadow-brand</span><span class="v">brand glow</span></div>
</body></html>
