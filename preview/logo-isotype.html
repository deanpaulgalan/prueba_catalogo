<!-- @dsCard group="Brand" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 100%; min-height: 220px; }
  .cell { display: flex; align-items: center; justify-content: center; padding: 32px; position: relative; }
  .cell .tag { position: absolute; bottom: 12px; left: 16px; font-family: var(--font-sub); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }
  .cell svg { width: 88px; height: 88px; }
  .on-white { background: var(--fs-white); color: var(--fs-blue); }
  .on-white .tag { color: var(--fg-3); }
  .on-sky { background: var(--fs-sky); color: var(--fs-blue); }
  .on-sky .tag { color: var(--fs-blue); opacity: .7; }
  .on-blue { background: var(--fs-blue); color: var(--fs-white); }
  .on-blue .tag { color: var(--fs-white); opacity: .7; }
</style>
</head>
<body class="card">
  <div class="grid">
    <div class="cell on-white">
      <svg viewBox="0 0 300 300" fill="currentColor"><circle cx="50" cy="50" r="50"/><rect x="100" y="0" width="200" height="100" rx="50"/><rect x="0" y="100" width="100" height="200" rx="50"/><circle cx="150" cy="150" r="50"/></svg>
      <span class="tag">Isotype · on white</span>
    </div>
    <div class="cell on-sky">
      <svg viewBox="0 0 300 300" fill="currentColor"><circle cx="50" cy="50" r="50"/><rect x="100" y="0" width="200" height="100" rx="50"/><rect x="0" y="100" width="100" height="200" rx="50"/><circle cx="150" cy="150" r="50"/></svg>
      <span class="tag">on sky</span>
    </div>
    <div class="cell on-blue">
      <svg viewBox="0 0 300 300" fill="currentColor"><circle cx="50" cy="50" r="50"/><rect x="100" y="0" width="200" height="100" rx="50"/><rect x="0" y="100" width="100" height="200" rx="50"/><circle cx="150" cy="150" r="50"/></svg>
      <span class="tag">on blue (reversed)</span>
    </div>
  </div>
</body>
</html>
