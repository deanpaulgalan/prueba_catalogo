<!-- @dsCard group="Type" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 32px 36px; background: var(--fs-sky); display:flex; flex-direction: column; gap: 12px; }
  .num { font-family: var(--font-sub); font-size: 11px; color: var(--fs-blue); width: 22px; height:22px; border-radius:999px; border:1px solid var(--fs-blue); display:inline-flex; align-items:center; justify-content:center; margin-right:10px; opacity:.65; }
  .eyebrow { font-family: var(--font-sub); font-weight: 600; font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: var(--fs-blue); display:flex; align-items:center; }
  .h1 { font-family: var(--font-display); font-weight: 800; font-size: 54px; color: var(--fs-blue); letter-spacing: -.03em; line-height: 1.02; display:flex; align-items:center; }
  .body { font-family: var(--font-body); font-size: 14px; line-height: 1.55; color: var(--fs-blue); max-width: 80%; display:flex; align-items: flex-start; }
</style></head>
<body class="card">
  <div class="h1"><span class="num">1</span>Elige el cambio,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;para tu hogar.</div>
  <div class="eyebrow"><span class="num">2</span>NUEVOS ESPACIOS INTELIGENTES</div>
  <div class="body"><span class="num">3</span>En un mundo en constante movimiento, nuestros hogares se han convertido en refugios donde buscamos, por encima de todo, comodidad y bienestar.</div>
</body></html>
