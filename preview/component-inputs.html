<!-- @dsCard group="Components" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .field { display:flex; flex-direction: column; gap: 6px; }
  .lab { font-family: var(--font-sub); font-weight: 500; font-size: 12px; color: var(--fg-2); }
  .input { font-family: var(--font-body); font-size: 14px; padding: 13px 18px; border-radius: 999px; border: 1px solid var(--border-1); background: #fff; color: var(--fg-1); transition: all 200ms; outline: none; }
  .input::placeholder { color: var(--fg-mute); }
  .input:focus { border-color: var(--fs-blue); box-shadow: 0 0 0 4px rgba(63,67,176,.14); }
  .search { background: var(--fs-paper); padding-left: 44px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%236B6F85' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4-4'/></svg>"); background-repeat: no-repeat; background-position: 16px center; }
  .toggle-row { display:flex; gap: 14px; align-items: center; }
  .switch { width: 44px; height: 24px; background: var(--fs-blue); border-radius: 999px; position:relative; }
  .switch::after { content:''; position:absolute; top:3px; left:23px; width: 18px; height: 18px; border-radius:999px; background:#fff; box-shadow: 0 2px 4px rgba(0,0,0,.18); }
  .switch.off { background: var(--fs-line); }
  .switch.off::after { left: 3px; }
  .chk { width:20px;height:20px;border-radius:6px;border:1.5px solid var(--fs-blue);background:var(--fs-blue);display:inline-flex;align-items:center;justify-content:center;color:#fff; }
</style></head>
<body class="card">
  <div class="field">
    <span class="lab">Buscar producto</span>
    <input class="input search" placeholder="¿Qué quieres automatizar?"/>
  </div>
  <div class="field">
    <span class="lab">Correo</span>
    <input class="input" value="hola@futurestore.com"/>
  </div>
  <div class="toggle-row">
    <span class="switch"></span><span class="lab" style="margin:0">Cerradura activa</span>
  </div>
  <div class="toggle-row">
    <span class="chk"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><polyline points="5 13 10 18 20 7"/></svg></span>
    <span class="lab" style="margin:0">Instalación incluida</span>
    <span class="switch off" style="margin-left:auto"></span><span class="lab" style="margin:0">Modo noche</span>
  </div>
</body></html>
