<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 28px 32px; }
  .row { display:flex; align-items:center; gap: 14px; margin-bottom: 10px; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); width: 80px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 44px; text-align: right; }
  .bar { background: var(--fs-blue); height: 12px; border-radius: 999px; }
</style></head>
<body class="card">
  
    <div class="row"><span class="name">--s-1</span><span class="px">4px</span><span class="bar" style="width:12.8px"></span></div>
  
    <div class="row"><span class="name">--s-2</span><span class="px">8px</span><span class="bar" style="width:25.6px"></span></div>
  
    <div class="row"><span class="name">--s-3</span><span class="px">12px</span><span class="bar" style="width:38.400000000000006px"></span></div>
  
    <div class="row"><span class="name">--s-4</span><span class="px">16px</span><span class="bar" style="width:51.2px"></span></div>
  
    <div class="row"><span class="name">--s-6</span><span class="px">24px</span><span class="bar" style="width:76.80000000000001px"></span></div>
  
    <div class="row"><span class="name">--s-8</span><span class="px">32px</span><span class="bar" style="width:102.4px"></span></div>
  
    <div class="row"><span class="name">--s-12</span><span class="px">48px</span><span class="bar" style="width:153.60000000000002px"></span></div>
  
    <div class="row"><span class="name">--s-16</span><span class="px">64px</span><span class="bar" style="width:204.8px"></span></div>
  
    <div class="row"><span class="name">--s-20</span><span class="px">80px</span><span class="bar" style="width:256px"></span></div>
  
    <div class="row"><span class="name">--s-24</span><span class="px">96px</span><span class="bar" style="width:307.20000000000005px"></span></div>
  
</body></html>
