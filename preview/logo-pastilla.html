<!-- @dsCard group="Brand" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 0; }
  .stage { height: 100%; min-height: 220px; display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .pane { padding: 28px; display: flex; align-items: center; gap: 20px; }
  .pane.photo {
    background-image:
      linear-gradient(135deg, rgba(11,13,42,.55), rgba(11,13,42,.25)),
      url('../assets/photo_lifestyle_3.jpg');
    background-size: cover; background-position: center;
  }
  .pane.color { background: var(--fs-violet); }
  .pastilla {
    background: var(--fs-white);
    border-radius: 999px;
    padding: 14px 22px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,.18);
  }
  .pastilla svg { width: 28px; height: 28px; }
  .pastilla .wm { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -.03em; color: var(--fs-blue); }
  .label {
    font-family: var(--font-sub); color: var(--fs-white); font-size: 11px;
    letter-spacing: .14em; text-transform: uppercase; opacity: .85;
    margin-left: auto;
  }
</style>
</head>
<body class="card">
  <div class="stage">
    <div class="pane photo">
      <div class="pastilla">
        <svg viewBox="0 0 300 300" fill="#3F43B0"><circle cx="50" cy="50" r="50"/><rect x="100" y="0" width="200" height="100" rx="50"/><rect x="0" y="100" width="100" height="200" rx="50"/><circle cx="150" cy="150" r="50"/></svg>
        <span class="wm">FutureStore</span>
      </div>
      <span class="label">Pastilla over photo</span>
    </div>
    <div class="pane color">
      <div class="pastilla">
        <svg viewBox="0 0 300 300" fill="#3F43B0"><circle cx="50" cy="50" r="50"/><rect x="100" y="0" width="200" height="100" rx="50"/><rect x="0" y="100" width="100" height="200" rx="50"/><circle cx="150" cy="150" r="50"/></svg>
        <span class="wm">FutureStore</span>
      </div>
      <span class="label">Pastilla on off-palette color</span>
    </div>
  </div>
</body>
</html>
