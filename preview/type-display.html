<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; justify-content: center; }
  .name { font-family: var(--font-sub); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3); }
  .specimen { font-family: var(--font-display); font-weight: 800; color: var(--fs-blue); letter-spacing: -0.03em; line-height: 1.02; }
  .d1 { font-size: 88px; }
  .d2 { font-size: 56px; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); margin-top: 4px; }
</style></head>
<body class="card">
  <div>
    <div class="name">Epilogue · Display 1 · 88 / 1.02 / -3%</div>
    <div class="specimen d1">Elige el cambio.</div>
  </div>
  <div>
    <div class="name">Epilogue · Display 2 · 56 / 1.02</div>
    <div class="specimen d2">Nuevos espacios inteligentes</div>
  </div>
</body></html>
