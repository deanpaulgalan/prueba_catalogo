<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body.card { padding: 0; }
  .grid { display: grid; grid-template-columns: 1.6fr 1fr; min-height: 240px; }
  .swatch { padding: 24px 28px; display: flex; flex-direction: column; justify-content: space-between; color: var(--fs-white); }
  .swatch.light { color: var(--fs-blue); }
  .name { font-family: var(--font-sub); font-weight: 600; font-size: 13px; letter-spacing: .12em; text-transform: uppercase; opacity: .8; }
  .hex { font-family: var(--font-display); font-weight: 800; font-size: 32px; letter-spacing: -.02em; }
  .meta { font-family: var(--font-body); font-size: 11px; opacity: .7; }
  .blue { background: #3F43B0; }
  .sky { background: #D0E1F2; }
</style>
</head>
<body class="card">
  <div class="grid">
    <div class="swatch blue">
      <span class="name">Future Blue · Primary</span>
      <div>
        <div class="hex">#3F43B0</div>
        <div class="meta">Pantone Blue 072 U · RGB 63 67 176 · CMYK 87 77 0 0</div>
      </div>
    </div>
    <div class="swatch sky light">
      <span class="name">Sky · Primary light</span>
      <div>
        <div class="hex">#D0E1F2</div>
        <div class="meta">Pantone 657 U</div>
      </div>
    </div>
  </div>
</body>
</html>
